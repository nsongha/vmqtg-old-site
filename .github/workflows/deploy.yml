name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Combine old + new site artifacts
        run: |
          mkdir -p _deploy
          cp -r site/. _deploy/
          cp -r vmqtg-new-site _deploy/vmqtg-new-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - id: deployment
        uses: actions/deploy-pages@v4

# To rebuild on push instead of serving committed site/:
# change runner to macos-latest, add actions/setup-python, run
#   BASE_PATH=/${{ github.event.repository.name }} python3 site/build.py
# before upload-pages-artifact. Requires source data folders in repo.
